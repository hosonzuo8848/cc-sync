name: enum

on:
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet requests
      - run: python idscan.py
      - uses: actions/upload-artifact@v4
        with:
          name: worklist
          path: worklist.csv

